<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafetín Central UCV - Prototipo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="modulo-login" class="modulo-login-full">
        <div class="login-card">
            <h2>👤 Ingreso Cafetín Central</h2>
            <p>Introduce tus datos para continuar</p>
            <form id="form-login" onsubmit="event.preventDefault(); validarLogin();">
                <input type="text" id="usuario" placeholder="Cédula o Correo" required>
                <input type="password" id="password" placeholder="Contraseña" required>
                <div class="botones-login">
                    <button type="submit" class="btn-primario">Iniciar Sesión</button>
                    <button type="button" class="btn-secundario" onclick="alert('Función de Registro Simulada')">Registrarse</button>
                </div>
            </form>
        </div>
    </section>

    <header id="main-header" style="display:none;">
        <h1>☕ Cafetín Central UCV</h1>
        <nav>
            <button onclick="verModulo('cliente')">Cliente</button>
            <button onclick="verModulo('caja')">Caja</button>
            <button onclick="verModulo('admin')">Admin</button>
            <button onclick="cerrarSesion()" style="background:#ff4444; color:white;">Salir</button>
        </nav>
    </header>

    <main id="main-content" style="display:none;">
        <section id="modulo-cliente" class="modulo">
            <h2>🛒 Menú Digital</h2>
            <div id="lista-productos" class="grid-productos"></div>
            
            <div class="carrito">
                <h3>Tu Pedido</h3>
                <ul id="items-carrito"></ul>
                <p>Total: <span id="total-carrito">0</span>$</p>
                <button onclick="simularPago()">Simular Pago en Línea</button>
            </div>
        </section>

        <section id="modulo-caja" class="modulo" style="display:none;">
            <h2>🖥️ Punto de Venta (Caja)</h2>
            <div class="controles-caja">
                <input type="text" id="busqueda-pedido" placeholder="ID de Pedido o Cliente">
                <button onclick="alert('Pedido Validado')">Validar Entrega</button>
            </div>
            <p>Estado de caja: Abierta</p>
        </section>

        <section id="modulo-admin" class="modulo" style="display:none;">
            <h2>⚙️ Panel de Administración</h2>
            <table id="tabla-gestion-menu">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Precio</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla-admin"></tbody>
            </table>
            <button onclick="alert('Función: Agregar nuevo producto')">Añadir Producto</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
